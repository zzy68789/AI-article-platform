# ========================================
# AI 爆款文章创作器 - Docker Compose 配置
# ========================================
# 使用方法：
#   1. 复制 .env.example 为 .env 并填写 API Key
#   2. 运行: docker compose up -d --build
#   3. 访问: http://localhost
# ========================================

services:
  # ============ MySQL 数据库 ============
  mysql:
    image: mysql:8.0
    container_name: ai-passage-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_passage_creator}
      TZ: ${TZ:-Asia/Shanghai}
    # 默认不暴露端口到宿主机（更安全），如需外部访问可取消注释
    # ports:
    ports:
      - "${MYSQL_PORT:-13306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      # SQL 初始化脚本（按文件名字母顺序执行）
      - ./sql/create_table.sql:/docker-entrypoint-initdb.d/01_create_table.sql:ro
      - ./sql/update_quota.sql:/docker-entrypoint-initdb.d/02_update_quota.sql:ro
      - ./sql/add_phase_fields.sql:/docker-entrypoint-initdb.d/03_add_phase_fields.sql:ro
      - ./sql/add_article_style.sql:/docker-entrypoint-initdb.d/04_add_article_style.sql:ro
      - ./sql/add_vip_payment.sql:/docker-entrypoint-initdb.d/05_add_vip_payment.sql:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: 
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --character-set-client-handshake=FALSE
      - --init-connect=SET NAMES utf8mb4
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=200
      - --innodb_buffer_pool_size=256M

  # ============ Redis 缓存 ============
  redis:
    image: redis:7-alpine
    container_name: ai-passage-redis
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    # 默认不暴露端口到宿主机（更安全），如需外部访问可取消注释
    # ports:
    #   - "${REDIS_PORT:-16379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}

  # ============ 后端服务 ============
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: ai-passage-backend:latest
    container_name: ai-passage-backend
    restart: unless-stopped
    environment:
      # Spring 配置
      SPRING_PROFILES_ACTIVE: prod
      TZ: ${TZ:-Asia/Shanghai}
      
      # 数据库配置
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-ai_passage_creator}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-root}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      
      # Redis 配置
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      
      # AI 配置（必需）
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:?请在 .env 中设置 DASHSCOPE_API_KEY}
      
      # Pexels 配置（必需）
      PEXELS_API_KEY: ${PEXELS_API_KEY:?请在 .env 中设置 PEXELS_API_KEY}
      
      # Nano Banana 配置（可选）
      NANO_BANANA_API_KEY: ${NANO_BANANA_API_KEY:-}
      
      # Stripe 配置（可选）
      STRIPE_API_KEY: ${STRIPE_API_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-http://localhost/vip?success=true}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-http://localhost/vip?cancelled=true}

      # 微信公众号发布配置（可选）
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-}
      WECHAT_DEFAULT_AUTHOR: ${WECHAT_DEFAULT_AUTHOR:-}
      WECHAT_BASE_URL: ${WECHAT_BASE_URL:-https://api.weixin.qq.com/cgi-bin}
      WECHAT_CONNECT_TIMEOUT_MS: ${WECHAT_CONNECT_TIMEOUT_MS:-10000}
      WECHAT_READ_TIMEOUT_MS: ${WECHAT_READ_TIMEOUT_MS:-30000}
      WECHAT_OPEN_PLATFORM_ENABLED: ${WECHAT_OPEN_PLATFORM_ENABLED:-false}
      WECHAT_COMPONENT_APP_ID: ${WECHAT_COMPONENT_APP_ID:-}
      WECHAT_COMPONENT_APP_SECRET: ${WECHAT_COMPONENT_APP_SECRET:-}
      WECHAT_COMPONENT_TOKEN: ${WECHAT_COMPONENT_TOKEN:-}
      WECHAT_COMPONENT_AES_KEY: ${WECHAT_COMPONENT_AES_KEY:-}
      WECHAT_AUTHORIZATION_REDIRECT_URI: ${WECHAT_AUTHORIZATION_REDIRECT_URI:-}
      WECHAT_FRONTEND_SUCCESS_URL: ${WECHAT_FRONTEND_SUCCESS_URL:-}
      WECHAT_CREDENTIAL_ENCRYPTION_KEY: ${WECHAT_CREDENTIAL_ENCRYPTION_KEY:-}
      
      # 腾讯云 COS 配置（可选）
      TENCENT_COS_SECRET_ID: ${TENCENT_COS_SECRET_ID:-}
      TENCENT_COS_SECRET_KEY: ${TENCENT_COS_SECRET_KEY:-}
      TENCENT_COS_REGION: ${TENCENT_COS_REGION:-ap-guangzhou}
      TENCENT_COS_BUCKET: ${TENCENT_COS_BUCKET:-}
      
      # JVM 配置
      JAVA_OPTS: ${JAVA_OPTS:--Xms512m -Xmx1024m -XX:+UseG1GC}
    ports:
      - "${BACKEND_PORT:-8123}:8123"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ============ 前端服务 ============
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: ai-passage-frontend:latest
    container_name: ai-passage-frontend
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ============ 网络配置 ============
networks:
  app-network:
    driver: bridge
    name: ai-passage-network

# ============ 数据卷配置 ============
volumes:
  mysql-data:
    name: ai-passage-mysql-data
  redis-data:
    name: ai-passage-redis-data
