# ========================================
# 生产环境配置（Docker 部署使用）
# ========================================

server:
  port: 8123

spring:
  # MySQL 数据库配置（通过环境变量覆盖）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ai_passage_creator?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
  # Redis 配置（通过环境变量覆盖）
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      database: 0
      password: ${SPRING_DATA_REDIS_PASSWORD:}
  # AI 配置
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      chat:
        options:
          model: qwen3.5-plus

# Pexels API 配置
pexels:
  api-key: ${PEXELS_API_KEY:}

# Nano Banana API 配置（可选）
nano:
  banana:
    api-key: ${NANO_BANANA_API_KEY:}

# Stripe 支付配置（可选）
stripe:
  api-key: ${STRIPE_API_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  success-url: ${STRIPE_SUCCESS_URL:http://localhost/vip?success=true}
  cancel-url: ${STRIPE_CANCEL_URL:http://localhost/vip?cancelled=true}

# 腾讯云 COS 配置（可选）
tencent:
  cos:
    secret-id: ${TENCENT_COS_SECRET_ID:}
    secret-key: ${TENCENT_COS_SECRET_KEY:}
    region: ${TENCENT_COS_REGION:ap-guangzhou}
    bucket: ${TENCENT_COS_BUCKET:}
